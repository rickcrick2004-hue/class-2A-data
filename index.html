    }

    function StudentDetail({ student, records, studentGrades, studentMockGrades, details, onUpdateDetails, onSaveRecord, onDeleteRecord, onBack, isPrintAllMode }) {
      const [newRecord, setNewRecord] = useState({ date: new Date().toISOString().split('T')[0], type: 'observation', content: '' });
      const [editingRecordId, setEditingRecordId] = useState(null);
      const [isEditingDetails, setIsEditingDetails] = useState(false);
      const [editDetails, setEditDetails] = useState({});

      useEffect(() => { setEditDetails(details); }, [details]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!newRecord.content.trim()) return;
        onSaveRecord(newRecord, editingRecordId);
        setNewRecord({ date: new Date().toISOString().split('T')[0], type: 'observation', content: '' });
        setEditingRecordId(null);
      };

      const handleEditRecord = (rec) => {
        setNewRecord({ date: rec.date, type: rec.type, content: rec.content });
        setEditingRecordId(rec.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleCancelEditRecord = () => {
        setNewRecord({ date: new Date().toISOString().split('T')[0], type: 'observation', content: '' });
        setEditingRecordId(null);
      };

      const handleSaveDetails = () => { onUpdateDetails(editDetails); setIsEditingDetails(false); };

      const detailFields = [
        { key: 'scholarship', label: '奨学生', type: 'select', options: ['', '奨A', '奨B', '奨C'] },
        { key: 'club', label: '部活', type: 'text' },
        { key: 'committee', label: 'クラスの係・委員会', type: 'text' },
        { key: 'event_role', label: '行事の係', type: 'text' },
        { key: 'course_kokugo', label: 'コース（国語）', type: 'select', options: ['', 'A', 'B', 'C'] },
        { key: 'course_sugaku', label: 'コース（数学）', type: 'select', options: ['', 'A', 'B', 'C'] },
        { key: 'course_eigo', label: 'コース（英語）', type: 'select', options: ['', 'A', 'B', 'C'] },
        { key: 'strong_subject', label: '得意教科', type: 'text' },
        { key: 'weak_subject', label: '苦手教科', type: 'text' },
        { key: 'dream', label: '将来の夢', type: 'text' },
        { key: 'university', label: '行きたい大学', type: 'text' },
        { key: 'friends', label: '仲の良い友達', type: 'text' },
        { key: 'good_points', label: '生徒の良いところ', type: 'text' },
        { key: 'areas_to_improve', label: '改善したほうがいいところ', type: 'text' },
        { key: 'others', label: 'その他', type: 'text' }
      ];

      return (
        <div className="max-w-4xl mx-auto print:max-w-none">
          {!isPrintAllMode && (
            <div className="print:hidden mb-6 flex gap-4 justify-between items-center">
              <button onClick={onBack} className="flex items-center text-slate-500 hover:text-blue-600 font-medium px-4 py-2 hover:bg-white rounded-lg transition-colors"><Icon name="ArrowLeft" size={18} className="mr-2" /> 生徒一覧に戻る</button>
              <button onClick={() => window.print()} className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-xl font-medium text-sm shadow-sm hover:shadow-md transition-all"><Icon name="Printer" size={18} /> この記録をPDF出力</button>
            </div>
          )}

          <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8 print:shadow-none print:border-b-2 print:border-slate-800 print:rounded-none print:px-0 print:py-2 print:mb-4">
            <div className="flex justify-between mb-2 items-end">
              <span className="text-lg font-bold text-slate-400 print:text-xs">出席番号 {student.number}番</span>
              {isPrintAllMode && <span className="print:block hidden text-xs text-slate-500 font-bold border px-2 py-0.5 rounded">2年A組</span>}
            </div>
            <div>
              <div className="text-slate-500 mb-1 print:text-[10px]">{student.kana}</div>
              <h2 className="text-4xl font-extrabold text-slate-800 flex items-center gap-3">
                {student.name}
                {details.scholarship && <span className="text-sm font-bold px-2 py-1 rounded bg-amber-100 text-amber-700 border border-amber-200 print:text-[10px] print:px-1 print:py-0 print:border-slate-400 print:text-black print:bg-transparent">{details.scholarship}</span>}
              </h2>
            </div>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 print:p-0 print:shadow-none print:border-none print:mb-4">
            <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-4 print:border-slate-300 print:pb-1 print:mb-2">
              <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Icon name="ClipboardList" size={20} className="text-indigo-600 print:text-black print:hidden" /> 生徒詳細情報</h3>
              {!isPrintAllMode && !isEditingDetails && (
                <button onClick={() => setIsEditingDetails(true)} className="print:hidden flex items-center gap-1 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors"><Icon name="Edit3" size={16} /> 編集</button>
              )}
              {!isPrintAllMode && isEditingDetails && (
                <button onClick={handleSaveDetails} className="print:hidden flex items-center gap-1 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition-colors shadow-sm"><Icon name="Check" size={16} /> 保存</button>
              )}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4 print:gap-x-4 print:gap-y-1">
              {detailFields.map(field => (
                <div key={field.key} className="flex flex-col">
                  <span className="text-xs font-bold text-slate-500 mb-1 print:mb-0 print:text-[8px]">{field.label}</span>
                  {isEditingDetails ? (
                    field.type === 'select' ? (
                      <select className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition-all" value={editDetails[field.key] || ''} onChange={e => setEditDetails({...editDetails, [field.key]: e.target.value})}>
                        {field.options.map(opt => <option key={opt} value={opt}>{opt || '未選択'}</option>)}
                      </select>
                    ) : (
                      <input type="text" className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition-all" value={editDetails[field.key] || ''} onChange={e => setEditDetails({...editDetails, [field.key]: e.target.value})} placeholder="未入力" />
                    )
                  ) : (
                    <span className="text-sm text-slate-800 font-medium py-1 border-b border-transparent bg-slate-50 px-3 rounded-md min-h-[28px] flex items-center print:bg-transparent print:px-1 print:border-b-slate-200">
                      {details[field.key] || <span className="text-slate-300 font-normal">未入力</span>}
                    </span>
                  )}
                </div>
              ))}
            </div>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 print:p-0 print:shadow-none print:border-none print:mb-4">
            <h3 className="text-lg font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:border-slate-300 print:pb-1 print:mb-2">
              <Icon name="FileSpreadsheet" size={20} className="text-blue-600 print:hidden" /> 定期考査 成績一覧
            </h3>
            <div className="overflow-x-auto mb-8 print:mb-4">
              <table className="w-full text-sm text-left border-collapse"><thead className="bg-slate-50 text-slate-600 font-bold">
                <tr><th className="p-3 border border-slate-200">考査名</th><th className="p-3 border border-slate-200 text-center">国語</th><th className="p-3 border border-slate-200 text-center">社会</th><th className="p-3 border border-slate-200 text-center">数学</th><th className="p-3 border border-slate-200 text-center">理科</th><th className="p-3 border border-slate-200 text-center">外国語</th><th className="p-3 border border-slate-200 text-center bg-blue-50/50 print:bg-transparent">総点</th><th className="p-3 border border-slate-200 text-center">平均</th><th className="p-3 border border-slate-200 text-center">学級席次</th><th className="p-3 border border-slate-200 text-center">学年席次</th></tr>
              </thead><tbody>
                {TEST_TERMS.map(term => {
                  const g = studentGrades[term.id];
                  return <tr key={term.id} className="hover:bg-slate-50"><td className="p-3 border border-slate-200">{term.name}</td><td className="p-3 border border-slate-200 text-center">{g?.kokugo||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.shakai||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.sugaku||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.rika||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.eigo||'-'}</td><td className="p-3 border border-slate-200 text-center font-bold bg-blue-50/30 print:bg-transparent">{g?.total||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.average||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.class_rank||'-'}</td><td className="p-3 border border-slate-200 text-center">{g?.grade_rank||'-'}</td></tr>
                })}
              </tbody></table>
            </div>
            <h3 className="text-lg font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:border-slate-300 print:pb-1 print:mb-2">
              <Icon name="LineChart" size={20} className="text-blue-600 print:hidden" /> 学力推移調査 成績一覧
            </h3>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left border-collapse"><thead className="bg-slate-50 text-slate-600 font-bold">
                <tr><th className="p-3 border border-slate-200" rowSpan="2">模試名</th><th className="p-2 border border-slate-200 text-center bg-blue-50/50 print:bg-transparent" colSpan="2">国数英 総合</th><th className="p-2 border border-slate-200 text-center" colSpan="2">国語</th><th className="p-2 border border-slate-200 text-center" colSpan="2">数学</th><th className="p-2 border border-slate-200 text-center" colSpan="2">英語</th></tr>
                <tr><th className="p-2 border border-slate-200 text-center text-xs bg-blue-50/50 print:bg-transparent">得点</th><th className="p-2 border border-slate-200 text-center text-xs bg-blue-50/50 print:bg-transparent print:text-black">偏差値</th><th className="p-2 border border-slate-200 text-center text-xs">得点</th><th className="p-2 border border-slate-200 text-center text-xs">偏差値</th><th className="p-2 border border-slate-200 text-center text-xs">得点</th><th className="p-2 border border-slate-200 text-center text-xs">偏差値</th><th className="p-2 border border-slate-200 text-center text-xs">得点</th><th className="p-2 border border-slate-200 text-center text-xs">偏差値</th></tr>
              </thead><tbody>
                {MOCK_EXAMS.map(mock => {
                  const mg = studentMockGrades[mock.id];
                  return <tr key={mock.id} className="hover:bg-slate-50"><td className="p-3 border border-slate-200">{mock.name}</td><td className="p-2 border border-slate-200 text-center font-bold bg-blue-50/30 print:bg-transparent">{mg?.total_score||'-'}</td><td className="p-2 border border-slate-200 text-center font-bold bg-blue-50/30 text-blue-700 print:text-black print:bg-transparent">{mg?.total_dev||'-'}</td><td className="p-2 border border-slate-200 text-center">{mg?.kokugo_score||'-'}</td><td className="p-2 border border-slate-200 text-center">{mg?.kokugo_dev||'-'}</td><td className="p-2 border border-slate-200 text-center">{mg?.sugaku_score||'-'}</td><td className="p-2 border border-slate-200 text-center">{mg?.sugaku_dev||'-'}</td><td className="p-2 border border-slate-200 text-center">{mg?.eigo_score||'-'}</td><td className="p-2 border border-slate-200 text-center">{mg?.eigo_dev||'-'}</td></tr>
                })}
              </tbody></table>
            </div>
          </div>

          {!isPrintAllMode && (
            <div className={`bg-white p-6 rounded-2xl shadow-sm border mb-8 transition-colors ${editingRecordId ? 'border-blue-400 ring-2 ring-blue-50' : 'border-slate-200'} print:hidden`}>
              <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                <Icon name={editingRecordId ? "Edit3" : "Plus"} size={20} className="text-blue-600" /> 
                {editingRecordId ? "記録を編集" : "新しい記録を追加"}
              </h3>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-600 mb-1">日付</label><input type="date" required className="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500" value={newRecord.date} onChange={e => setNewRecord({...newRecord, date: e.target.value})} /></div><div className="flex-1"><label className="block text-sm font-bold text-slate-600 mb-1">種類</label><select className="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500" value={newRecord.type} onChange={e => setNewRecord({...newRecord, type: e.target.value})}>{Object.entries(RECORD_TYPES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}</select></div></div>
                <div><label className="block text-sm font-bold text-slate-600 mb-1">内容</label><textarea required className="w-full p-4 bg-slate-50 border rounded-xl min-h-[120px] focus:ring-2 focus:ring-blue-500" value={newRecord.content} onChange={e => setNewRecord({...newRecord, content: e.target.value})} /></div>
                <div className="flex justify-end gap-2">
                  {editingRecordId && (
                    <button type="button" onClick={handleCancelEditRecord} className="flex items-center gap-2 px-4 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-200"><Icon name="X" size={18} /> キャンセル</button>
                  )}
                  <button type="submit" className="flex items-center gap-2 px-6 py-3 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 shadow-sm"><Icon name="Save" size={18} /> {editingRecordId ? "更新する" : "記録を保存"}</button>
                </div>
              </form>
            </div>
          )}

          <div>
            <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 print:border-slate-300 print:pb-1 print:mb-2">これまでの記録</h3>
            <div className="space-y-6 print:space-y-2">
              {records.length > 0 ? records.map(record => {
                const typeInfo = RECORD_TYPES[record.type];
                return (
                  <div key={record.id} className="md:flex gap-6 items-start">
                    <div className="md:w-[100px] flex-shrink-0 pt-1 mb-2 md:mb-0"><div className="text-sm font-bold text-slate-500">{record.date}</div></div>
                    <div className="flex-1 bg-white p-5 rounded-2xl shadow-sm border border-slate-200 print:shadow-none print:border-slate-300 print:rounded-lg relative group hover:shadow-md transition-shadow">
                      <div className="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity print:hidden">
                        <button onClick={() => handleEditRecord(record)} className="text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-white rounded-full p-1.5 shadow-sm border border-slate-100"><Icon name="Edit3" size={16} /></button>
                        <button onClick={() => onDeleteRecord(record.id)} className="text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-white rounded-full p-1.5 shadow-sm border border-slate-100"><Icon name="Trash2" size={16} /></button>
                      </div>
                      <div className="flex items-center gap-2 mb-3 print:mb-1 pr-14"><span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold border ${typeInfo.color} print:border-slate-400 print:text-black print:bg-transparent print:px-2 print:py-0.5`}><Icon name={typeInfo.icon} size={14} className="print:hidden" /> {typeInfo.label}</span></div>
                      <p className="whitespace-pre-wrap text-slate-700 print:text-black leading-relaxed">{record.content}</p>
                    </div>
                  </div>
                )
              }) : <div className="text-center py-12 bg-white rounded-2xl border border-dashed print:hidden"><p className="text-slate-500">まだ記録はありません。</p></div>}
            </div>
          </div>
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium ${active ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'text-slate-600 hover:bg-slate-50'}`}>
          {icon} {label}
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
