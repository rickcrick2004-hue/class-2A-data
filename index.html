    function StudentDetailsView({ studentDetails, setStudentDetails, students, showToast }) {
      const fileInputRef = useRef(null);
      const [sortConfig, setSortConfig] = useState({ key: 'number', direction: 'asc' });

      const handleSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') { direction = 'asc'; }
        setSortConfig({ key, direction });
      };

      const resetSort = () => { setSortConfig({ key: 'number', direction: 'asc' }); };

      const sortedStudents = [...students].sort((a, b) => {
        if (sortConfig.key === 'number') { return sortConfig.direction === 'asc' ? a.number - b.number : b.number - a.number; }
        if (sortConfig.key === 'name') { return sortConfig.direction === 'asc' ? a.kana.localeCompare(b.kana, 'ja') : b.kana.localeCompare(a.kana, 'ja'); }
        
        const dA = studentDetails[a.id] || {};
        const dB = studentDetails[b.id] || {};
        const valA = dA[sortConfig.key] || '';
        const valB = dB[sortConfig.key] || '';
        
        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
      });

      const SortIcon = ({ columnKey }) => {
        if (sortConfig.key !== columnKey) return <Icon name="ArrowUpDown" size={10} className="text-slate-300 ml-1 inline-block" />;
        return sortConfig.direction === 'asc' ? <Icon name="ArrowUp" size={10} className="text-blue-500 ml-1 inline-block" /> : <Icon name="ArrowDown" size={10} className="text-blue-500 ml-1 inline-block" />;
      };

      const handleDownloadCSV = () => {
        let csvContent = "出席番号,氏名,奨学生,部活,クラスの係・委員会,行事の係,コース（国語）,コース（数学）,コース（英語）,得意教科,苦手教科,将来の夢,行きたい大学,仲の良い友達,生徒の良いところ,改善したほうがいいところ,その他\n";
        students.forEach(student => {
          const d = studentDetails[student.id] || {};
          const escapeCSV = (str) => {
            if (!str) return '';
            const s = String(str).replace(/"/g, '""');
            if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s}"`;
            return s;
          };
          const row = [
            student.number, student.name, escapeCSV(d.scholarship), escapeCSV(d.club), escapeCSV(d.committee), escapeCSV(d.event_role), 
            escapeCSV(d.course_kokugo), escapeCSV(d.course_sugaku), escapeCSV(d.course_eigo), escapeCSV(d.strong_subject), 
            escapeCSV(d.weak_subject), escapeCSV(d.dream), escapeCSV(d.university), escapeCSV(d.friends),
            escapeCSV(d.good_points), escapeCSV(d.areas_to_improve), escapeCSV(d.others)
          ];
          csvContent += row.join(",") + "\n";
        });
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `中2A_生徒詳細情報.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleUploadCSV = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const parseCSVLine = (text) => {
            const result = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
              const char = text[i];
              if (inQuotes) {
                if (char === '"') {
                  if (i + 1 < text.length && text[i + 1] === '"') { current += '"'; i++; } else { inQuotes = false; }
                } else { current += char; }
              } else {
                if (char === '"') { inQuotes = true; } else if (char === ',') { result.push(current); current = ''; } else { current += char; }
              }
            }
            result.push(current); return result;
          };
          const lines = e.target.result.split(/\r\n|\n/);
          const newStudentDetails = { ...studentDetails };
          let updatedCount = 0;
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = parseCSVLine(lines[i]).map(v => v.trim());
            const studentNum = parseInt(values[0], 10);
            const student = students.find(s => s.number === studentNum);
            if (student) {
              newStudentDetails[student.id] = { 
                scholarship: values[2]||'', club: values[3]||'', committee: values[4]||'', event_role: values[5]||'', 
                course_kokugo: values[6]||'', course_sugaku: values[7]||'', course_eigo: values[8]||'', 
                strong_subject: values[9]||'', weak_subject: values[10]||'', dream: values[11]||'', 
                university: values[12]||'', friends: values[13]||'', good_points: values[14]||'',
                areas_to_improve: values[15]||'', others: values[16]||''
              };
              updatedCount++;
            }
          }
          setStudentDetails(newStudentDetails);
          event.target.value = null;
          showToast(`${updatedCount}名の詳細情報を読み込みました。`);
        };
        reader.readAsText(file);
      };

      return (
        <div className="max-w-full mx-auto animate-in fade-in duration-300">
          <header className="mb-8 flex justify-between items-end flex-wrap gap-4">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">生徒詳細情報管理</h2>
              <p className="text-slate-500 mt-2">部活や進路希望などの情報を一括でダウンロード・アップロードします。</p>
            </div>
            <button onClick={resetSort} className="flex items-center gap-1 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors"><Icon name="RotateCcw" size={14} /> 元の順番に戻る</button>
          </header>
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div className="flex flex-wrap gap-6 items-end justify-between border-b border-slate-100 pb-6 mb-6">
              <div className="flex gap-3">
                <button onClick={handleDownloadCSV} className="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 transition-colors"><Icon name="Download" size={18} /> CSVフォーマットをダウンロード</button>
                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={handleUploadCSV} />
                <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 px-4 py-2.5 bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-xl font-bold text-sm shadow-sm hover:bg-indigo-100 transition-colors"><Icon name="Upload" size={18} /> 入力したCSVをアップロード</button>
              </div>
            </div>
            <div className="overflow-x-auto relative">
              <table className="w-full text-sm text-left border-collapse min-w-[1600px]"><thead className="bg-slate-50 text-slate-600 font-bold border-y border-slate-200 select-none">
                <tr>
                  <th className="p-3 text-center border-r border-slate-200 w-12 cursor-pointer hover:bg-slate-200 sticky left-0 z-20 bg-slate-50" onClick={() => handleSort('number')}>番号<SortIcon columnKey="number" /></th>
                  <th className="p-3 border-r border-slate-200 w-32 cursor-pointer hover:bg-slate-200 sticky left-[48px] z-20 bg-slate-50" onClick={() => handleSort('name')}>氏名<SortIcon columnKey="name" /></th>
                  <th className="p-3 text-center border-r border-slate-200 cursor-pointer hover:bg-slate-100" onClick={() => handleSort('scholarship')}>奨学生<SortIcon columnKey="scholarship" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('club')}>部活<SortIcon columnKey="club" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('committee')}>係・委員会<SortIcon columnKey="committee" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('event_role')}>行事係<SortIcon columnKey="event_role" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('course_kokugo')}>国語<SortIcon columnKey="course_kokugo" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('course_sugaku')}>数学<SortIcon columnKey="course_sugaku" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('course_eigo')}>英語<SortIcon columnKey="course_eigo" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('strong_subject')}>得意教科<SortIcon columnKey="strong_subject" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('weak_subject')}>苦手教科<SortIcon columnKey="weak_subject" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('dream')}>将来の夢<SortIcon columnKey="dream" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('university')}>行きたい大学<SortIcon columnKey="university" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('friends')}>仲の良い友達<SortIcon columnKey="friends" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('good_points')}>生徒の良いところ<SortIcon columnKey="good_points" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('areas_to_improve')}>改善したほうがいいところ<SortIcon columnKey="areas_to_improve" /></th>
                  <th className="p-3 cursor-pointer hover:bg-slate-100 whitespace-nowrap" onClick={() => handleSort('others')}>その他<SortIcon columnKey="others" /></th>
                </tr>
              </thead><tbody className="divide-y divide-slate-100">
                {sortedStudents.map(student => {
                  const d = studentDetails[student.id] || {};
                  return <tr key={student.id} className="group hover:bg-slate-50 transition-colors">
                    <td className="p-3 text-center border-r border-slate-200 font-bold text-slate-500 sticky left-0 z-10 bg-white group-hover:bg-slate-50">{student.number}</td>
                    <td className="p-3 border-r border-slate-200 font-bold text-slate-800 sticky left-[48px] z-10 bg-white group-hover:bg-slate-50">{student.name}</td>
                    <td className="p-3 text-center border-r border-slate-200 font-bold text-amber-600">{d.scholarship||'-'}</td>
                    <td className="p-3 truncate">{d.club||'-'}</td><td className="p-3 truncate">{d.committee||'-'}</td><td className="p-3 truncate">{d.event_role||'-'}</td>
                    <td className="p-3 truncate">{d.course_kokugo||'-'}</td><td className="p-3 truncate">{d.course_sugaku||'-'}</td><td className="p-3 truncate">{d.course_eigo||'-'}</td>
                    <td className="p-3 truncate">{d.strong_subject||'-'}</td><td className="p-3 truncate">{d.weak_subject||'-'}</td><td className="p-3 truncate">{d.dream||'-'}</td>
                    <td className="p-3 truncate">{d.university||'-'}</td><td className="p-3 truncate">{d.friends||'-'}</td><td className="p-3 truncate">{d.good_points||'-'}</td>
                    <td className="p-3 truncate">{d.areas_to_improve||'-'}</td><td className="p-3 truncate">{d.others||'-'}</td>
                  </tr>
                })}
              </tbody></table>
            </div>
          </div>
        </div>
      );
    }

    function GradesView({ grades, setGrades, students, testTerms, showToast }) {
      const [selectedTerm, setSelectedTerm] = useState(testTerms[0].id);
      const [sortConfig, setSortConfig] = useState({ key: 'number', direction: 'asc' });
      const fileInputRef = useRef(null);

      const handleSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') { direction = 'asc'; }
        setSortConfig({ key, direction });
      };

      const resetSort = () => { setSortConfig({ key: 'number', direction: 'asc' }); };

      const sortedStudents = [...students].sort((a, b) => {
        if (sortConfig.key === 'number') return sortConfig.direction === 'asc' ? a.number - b.number : b.number - a.number;
        if (sortConfig.key === 'name') return sortConfig.direction === 'asc' ? a.kana.localeCompare(b.kana, 'ja') : b.kana.localeCompare(a.kana, 'ja');
        
        const gA = grades[selectedTerm]?.[a.id] || {};
        const gB = grades[selectedTerm]?.[b.id] || {};
        const valA = gA[sortConfig.key];
        const valB = gB[sortConfig.key];
        const numA = valA === '' || valA === undefined || valA === '-' ? -Infinity : Number(valA);
        const numB = valB === '' || valB === undefined || valB === '-' ? -Infinity : Number(valB);

        if (numA < numB) return sortConfig.direction === 'asc' ? -1 : 1;
        if (numA > numB) return sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
      });

      const SortIcon = ({ columnKey }) => {
        if (sortConfig.key !== columnKey) return <Icon name="ArrowUpDown" size={12} className="text-slate-300 ml-1 inline-block" />;
        return sortConfig.direction === 'asc' ? <Icon name="ArrowUp" size={12} className="text-blue-500 ml-1 inline-block" /> : <Icon name="ArrowDown" size={12} className="text-blue-500 ml-1 inline-block" />;
      };

      const handleDownloadCSV = () => {
        const termName = testTerms.find(t => t.id === selectedTerm).name;
        let csvContent = "出席番号,氏名,国語,社会,数学,理科,外国語,総点,平均点,学級席次,学年席次\n";
        students.forEach(student => {
          const g = grades[selectedTerm]?.[student.id] || {};
          const row = [student.number, student.name, g.kokugo||'', g.shakai||'', g.sugaku||'', g.rika||'', g.eigo||'', g.total||'', g.average||'', g.class_rank||'', g.grade_rank||''];
          csvContent += row.join(",") + "\n";
        });
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `中2A_${termName}成績.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const lines = e.target.result.split(/\r\n|\n/);
          const newTermGrades = { ...(grades[selectedTerm] || {}) };
          let updatedCount = 0;
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(',').map(v => v.trim());
            const studentNum = parseInt(values[0], 10);
            const student = students.find(s => s.number === studentNum);
            if (student) {
              newTermGrades[student.id] = { kokugo: values[2]||'', shakai: values[3]||'', sugaku: values[4]||'', rika: values[5]||'', eigo: values[6]||'', total: values[7]||'', average: values[8]||'', class_rank: values[9]||'', grade_rank: values[10]||'' };
              updatedCount++;
            }
          }
          setGrades(prev => ({ ...prev, [selectedTerm]: newTermGrades }));
          event.target.value = null;
          showToast(`${updatedCount}名の成績データを読み込みました。`);
        };
        reader.readAsText(file);
      };

      return (
        <div className="max-w-6xl mx-auto">
          <header className="mb-8 flex justify-between items-end">
            <h2 className="text-2xl font-bold text-slate-800">定期考査 成績管理</h2>
            <button onClick={resetSort} className="flex items-center gap-1 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors"><Icon name="RotateCcw" size={14} /> 元の順番に戻る</button>
          </header>
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div className="flex flex-wrap gap-6 items-end justify-between border-b border-slate-100 pb-6 mb-6">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-2">表示・入力する考査を選択</label>
                <div className="flex flex-wrap gap-2">
                  {testTerms.map(term => (
                    <button key={term.id} onClick={() => setSelectedTerm(term.id)} className={`px-4 py-2 rounded-lg text-sm font-bold ${selectedTerm === term.id ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{term.name}</button>
                  ))}
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={handleDownloadCSV} className="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold text-sm shadow-sm"><Icon name="Download" size={18} /> CSVダウンロード</button>
                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={handleUploadCSV} />

              </div>

              <table className="w-full text-sm text-left border-collapse min-w-[800px]"><thead className="bg-slate-50 text-slate-600 font-bold border-y border-slate-200 select-none">
                <tr>
                  <th className="p-3 text-center border-r border-slate-200 w-12 cursor-pointer hover:bg-slate-200 sticky left-0 z-20 bg-slate-50" onClick={() => handleSort('number')}>番号<SortIcon columnKey="number" /></th>
                  <th className="p-3 border-r border-slate-200 w-32 cursor-pointer hover:bg-slate-200 sticky left-[48px] z-20 bg-slate-50" onClick={() => handleSort('name')}>氏名<SortIcon columnKey="name" /></th>
                  <th className="p-3 text-center cursor-pointer hover:bg-slate-100" onClick={() => handleSort('kokugo')}>国語<SortIcon columnKey="kokugo" /></th>
                  <th className="p-3 text-center cursor-pointer hover:bg-slate-100" onClick={() => handleSort('shakai')}>社会<SortIcon columnKey="shakai" /></th>
                  <th className="p-3 text-center cursor-pointer hover:bg-slate-100" onClick={() => handleSort('sugaku')}>数学<SortIcon columnKey="sugaku" /></th>
                  <th className="p-3 text-center cursor-pointer hover:bg-slate-100" onClick={() => handleSort('rika')}>理科<SortIcon columnKey="rika" /></th>
                  <th className="p-3 text-center border-r border-slate-200 cursor-pointer hover:bg-slate-100" onClick={() => handleSort('eigo')}>外国語<SortIcon columnKey="eigo" /></th>
                  <th className="p-3 text-center bg-blue-50/50 cursor-pointer hover:bg-blue-100" onClick={() => handleSort('total')}>総点<SortIcon columnKey="total" /></th>
                  <th className="p-3 text-center border-r border-slate-200 cursor-pointer hover:bg-slate-100" onClick={() => handleSort('average')}>平均点<SortIcon columnKey="average" /></th>
                  <th className="p-3 text-center cursor-pointer hover:bg-slate-100" onClick={() => handleSort('class_rank')}>学級席次<SortIcon columnKey="class_rank" /></th>
                  <th className="p-3 text-center cursor-pointer hover:bg-slate-100" onClick={() => handleSort('grade_rank')}>学年席次<SortIcon columnKey="grade_rank" /></th>
                </tr>
              </thead><tbody className="divide-y divide-slate-100">
                {sortedStudents.map(student => {
                  const g = grades[selectedTerm]?.[student.id];
                  const hasData = !!g && Object.values(g).some(v => v !== '');
                  return <tr key={student.id} className="group hover:bg-slate-50 transition-colors">
                    <td className="p-3 text-center border-r border-slate-200 font-bold text-slate-500 sticky left-0 z-10 bg-white group-hover:bg-slate-50">{student.number}</td>
                    <td className="p-3 border-r border-slate-200 font-bold text-slate-800 sticky left-[48px] z-10 bg-white group-hover:bg-slate-50">{student.name}</td>
                    <td className={`p-3 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.kokugo||'-'}</td><td className={`p-3 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.shakai||'-'}</td><td className={`p-3 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.sugaku||'-'}</td><td className={`p-3 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.rika||'-'}</td><td className={`p-3 text-center border-r border-slate-200 ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.eigo||'-'}</td><td className={`p-3 text-center font-bold bg-blue-50/30 ${hasData?'text-blue-800':'text-slate-300'}`}>{g?.total||'-'}</td><td className={`p-3 text-center border-r border-slate-200 ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.average||'-'}</td><td className={`p-3 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.class_rank||'-'}</td><td className={`p-3 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{g?.grade_rank||'-'}</td></tr>
                })}
              </tbody></table>
            </div>
          </div>
        </div>
      );
    }

    function MockGradesView({ mockGrades, setMockGrades, students, mockExams, showToast }) {
      const [selectedMock, setSelectedMock] = useState(mockExams[0].id);
      const [sortConfig, setSortConfig] = useState({ key: 'number', direction: 'asc' });
      const fileInputRef = useRef(null);

      const handleSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') { direction = 'asc'; }
        setSortConfig({ key, direction });
      };

      const resetSort = () => { setSortConfig({ key: 'number', direction: 'asc' }); };

      const sortedStudents = [...students].sort((a, b) => {
        if (sortConfig.key === 'number') return sortConfig.direction === 'asc' ? a.number - b.number : b.number - a.number;
        if (sortConfig.key === 'name') return sortConfig.direction === 'asc' ? a.kana.localeCompare(b.kana, 'ja') : b.kana.localeCompare(a.kana, 'ja');
        
        const gA = mockGrades[selectedMock]?.[a.id] || {};
        const gB = mockGrades[selectedMock]?.[b.id] || {};
        const valA = gA[sortConfig.key];
        const valB = gB[sortConfig.key];
        const numA = valA === '' || valA === undefined || valA === '-' ? -Infinity : Number(valA);
        const numB = valB === '' || valB === undefined || valB === '-' ? -Infinity : Number(valB);

        if (numA < numB) return sortConfig.direction === 'asc' ? -1 : 1;
        if (numA > numB) return sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
      });

      const SortIcon = ({ columnKey }) => {
        if (sortConfig.key !== columnKey) return <Icon name="ArrowUpDown" size={10} className="text-slate-300 ml-1 inline-block" />;
        return sortConfig.direction === 'asc' ? <Icon name="ArrowUp" size={10} className="text-blue-500 ml-1 inline-block" /> : <Icon name="ArrowDown" size={10} className="text-blue-500 ml-1 inline-block" />;
      };

      const handleDownloadCSV = () => {
        const mockName = mockExams.find(m => m.id === selectedMock).name;
        let csvContent = "出席番号,氏名,国数英得点,国数英偏差値,国語得点,国語偏差値,数学得点,数学偏差値,英語得点,英語偏差値\n";
        students.forEach(student => {
          const mg = mockGrades[selectedMock]?.[student.id] || {};
          const row = [student.number, student.name, mg.total_score||'', mg.total_dev||'', mg.kokugo_score||'', mg.kokugo_dev||'', mg.sugaku_score||'', mg.sugaku_dev||'', mg.eigo_score||'', mg.eigo_dev||''];
          csvContent += row.join(",") + "\n";
        });
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", `中2A_${mockName}成績.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleUploadCSV = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const lines = e.target.result.split(/\r\n|\n/);
          const newMockGrades = { ...(mockGrades[selectedMock] || {}) };
          let updatedCount = 0;
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(',').map(v => v.trim());
            const studentNum = parseInt(values[0], 10);
            const student = students.find(s => s.number === studentNum);
            if (student) {
              newMockGrades[student.id] = { total_score: values[2]||'', total_dev: values[3]||'', kokugo_score: values[4]||'', kokugo_dev: values[5]||'', sugaku_score: values[6]||'', sugaku_dev: values[7]||'', eigo_score: values[8]||'', eigo_dev: values[9]||'' };
              updatedCount++;
            }
          }
          setMockGrades(prev => ({ ...prev, [selectedMock]: newMockGrades }));
          event.target.value = null;
          showToast(`${updatedCount}名の模試成績データを読み込みました。`);
        };
        reader.readAsText(file);
      };

      return (
        <div className="max-w-6xl mx-auto">
          <header className="mb-8 flex justify-between items-end">
            <h2 className="text-2xl font-bold text-slate-800">模試成績 (学力推移調査)</h2>
            <button onClick={resetSort} className="flex items-center gap-1 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors"><Icon name="RotateCcw" size={14} /> 元の順番に戻る</button>
          </header>
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div className="flex flex-wrap gap-6 items-end justify-between border-b border-slate-100 pb-6 mb-6">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-2">表示・入力する回を選択</label>
                <div className="flex flex-wrap gap-2">
                  {mockExams.map(mock => (
                    <button key={mock.id} onClick={() => setSelectedMock(mock.id)} className={`px-4 py-2 rounded-lg text-sm font-bold ${selectedMock === mock.id ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{mock.name}</button>
                  ))}
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={handleDownloadCSV} className="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold text-sm shadow-sm"><Icon name="Download" size={18} /> CSVダウンロード</button>
                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={handleUploadCSV} />
                <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 px-4 py-2.5 bg-blue-50 border border-blue-200 text-blue-700 rounded-xl font-bold text-sm shadow-sm"><Icon name="Upload" size={18} /> CSVアップロード</button>
              </div>
            </div>
            <div className="overflow-x-auto relative">
              <table className="w-full text-sm text-left border-collapse min-w-[800px]"><thead className="bg-slate-50 text-slate-600 font-bold border-y border-slate-200 select-none">
                <tr>
                  <th className="p-3 text-center border-r border-slate-200 w-12 cursor-pointer hover:bg-slate-200 sticky left-0 z-20 bg-slate-50" rowSpan="2" onClick={() => handleSort('number')}>番号<SortIcon columnKey="number" /></th>
                  <th className="p-3 border-r border-slate-200 w-32 cursor-pointer hover:bg-slate-200 sticky left-[48px] z-20 bg-slate-50" rowSpan="2" onClick={() => handleSort('name')}>氏名<SortIcon columnKey="name" /></th>
                  <th className="p-2 text-center border-r border-slate-200 bg-blue-50/50" colSpan="2">国数英 総合</th>
                  <th className="p-2 text-center border-r border-slate-200" colSpan="2">国語</th>
                  <th className="p-2 text-center border-r border-slate-200" colSpan="2">数学</th>
                  <th className="p-2 text-center" colSpan="2">英語</th>
                </tr>
                <tr>
                  <th className="p-2 text-center text-xs bg-blue-50/50 cursor-pointer hover:bg-blue-100" onClick={() => handleSort('total_score')}>得点<SortIcon columnKey="total_score" /></th>
                  <th className="p-2 text-center text-xs border-r border-slate-200 bg-blue-50/50 text-blue-700 cursor-pointer hover:bg-blue-100" onClick={() => handleSort('total_dev')}>偏差値<SortIcon columnKey="total_dev" /></th>
                  <th className="p-2 text-center text-xs cursor-pointer hover:bg-slate-100" onClick={() => handleSort('kokugo_score')}>得点<SortIcon columnKey="kokugo_score" /></th>
                  <th className="p-2 text-center text-xs border-r border-slate-200 cursor-pointer hover:bg-slate-100" onClick={() => handleSort('kokugo_dev')}>偏差値<SortIcon columnKey="kokugo_dev" /></th>
                  <th className="p-2 text-center text-xs cursor-pointer hover:bg-slate-100" onClick={() => handleSort('sugaku_score')}>得点<SortIcon columnKey="sugaku_score" /></th>
                  <th className="p-2 text-center text-xs border-r border-slate-200 cursor-pointer hover:bg-slate-100" onClick={() => handleSort('sugaku_dev')}>偏差値<SortIcon columnKey="sugaku_dev" /></th>
                  <th className="p-2 text-center text-xs cursor-pointer hover:bg-slate-100" onClick={() => handleSort('eigo_score')}>得点<SortIcon columnKey="eigo_score" /></th>
                  <th className="p-2 text-center text-xs cursor-pointer hover:bg-slate-100" onClick={() => handleSort('eigo_dev')}>偏差値<SortIcon columnKey="eigo_dev" /></th>
                </tr>
              </thead><tbody className="divide-y divide-slate-100">
                {sortedStudents.map(student => {
                  const mg = mockGrades[selectedMock]?.[student.id];
                  const hasData = !!mg && Object.values(mg).some(v => v !== '');
                  return <tr key={student.id} className="group hover:bg-slate-50 transition-colors">
                    <td className="p-3 text-center border-r border-slate-200 font-bold text-slate-500 sticky left-0 z-10 bg-white group-hover:bg-slate-50">{student.number}</td>
                    <td className="p-3 border-r border-slate-200 font-bold text-slate-800 sticky left-[48px] z-10 bg-white group-hover:bg-slate-50">{student.name}</td>
                    <td className={`p-2 text-center bg-blue-50/30 font-bold ${hasData?'text-slate-800':'text-slate-300'}`}>{mg?.total_score||'-'}</td><td className={`p-2 text-center border-r border-slate-200 bg-blue-50/30 font-bold ${hasData?'text-blue-700':'text-slate-300'}`}>{mg?.total_dev||'-'}</td><td className={`p-2 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{mg?.kokugo_score||'-'}</td><td className={`p-2 text-center border-r border-slate-200 ${hasData?'text-slate-600':'text-slate-300'}`}>{mg?.kokugo_dev||'-'}</td><td className={`p-2 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{mg?.sugaku_score||'-'}</td><td className={`p-2 text-center border-r border-slate-200 ${hasData?'text-slate-600':'text-slate-300'}`}>{mg?.sugaku_dev||'-'}</td><td className={`p-2 text-center ${hasData?'text-slate-800':'text-slate-300'}`}>{mg?.eigo_score||'-'}</td><td className={`p-2 text-center ${hasData?'text-slate-600':'text-slate-300'}`}>{mg?.eigo_dev||'-'}</td></tr>
                })}
              </tbody></table>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
